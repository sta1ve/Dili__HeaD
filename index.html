<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DiliHead — Boss Rush</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden}
  body{background:#0a0a12;display:flex;justify-content:center;align-items:center;font-family:'Press Start 2P',monospace}
  #W{position:relative;image-rendering:pixelated;width:100%;height:100%;display:flex;justify-content:center;align-items:center}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;border:none}
  #O{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;
    pointer-events:none;z-index:10;background:rgba(5,5,15,0.92);opacity:0;transition:opacity 0.3s;
    padding:clamp(8px,2vw,20px);overflow:hidden}
  #O.active{pointer-events:all;opacity:1}
  #O h1{font-size:clamp(12px,3vw,20px);color:#fff;text-shadow:0 0 15px #4466ff,0 3px 0 #111;margin-bottom:6px;text-align:center;line-height:1.4}
  #O h2{font-size:clamp(6px,1.5vw,9px);color:#99a;margin-bottom:10px;text-align:center;line-height:1.8}
  .bs{display:flex;gap:clamp(6px,1.5vw,14px);margin-bottom:10px;flex-wrap:wrap;justify-content:center}
  .bc{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.2vw,8px);padding:clamp(6px,1.5vw,12px);width:clamp(100px,22vw,155px);
    background:linear-gradient(180deg,#1a1a3a,#0e0e22);color:#aab;border:2px solid #333;cursor:pointer;text-align:center;line-height:1.8;transition:all .2s}
  .bc:hover{border-color:#4466ff;color:#fff;box-shadow:0 0 15px rgba(68,102,255,0.4);transform:translateY(-2px)}
  .bc .bi{font-size:clamp(16px,3.5vw,26px);display:block;margin-bottom:4px}
  .bc .bt{color:#fff;font-size:clamp(7px,1.3vw,9px)}
  .btn{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.5vw,11px);padding:clamp(7px,1.2vw,11px) clamp(14px,3vw,24px);
    background:linear-gradient(180deg,#4466ff,#2233aa);color:#fff;border:2px solid #6688ff;cursor:pointer;transition:all .2s;
    box-shadow:0 3px 0 #111,0 0 15px rgba(68,102,255,0.4)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 5px 0 #111,0 0 25px rgba(68,102,255,0.6)}
  .ch{font-size:clamp(5px,1vw,7px);color:#445;margin-top:8px;text-align:center;line-height:2}
  .df{opacity:.3;pointer-events:none;border-color:#1a1a1a}
  .btn-sm{font-size:clamp(6px,1.2vw,8px);padding:clamp(5px,1vw,8px) clamp(10px,2vw,16px);margin-top:6px}
  /* Keybindings — compact grid, NO scrollbar */
  .kb-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin:8px auto;max-width:420px}
  .kb-item{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:3px 0}
  .kb-lbl{color:#667;font-size:clamp(5px,1vw,7px);white-space:nowrap}
  .kb-btn{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.1vw,8px);padding:4px 10px;min-width:60px;
    background:#1a1a3a;color:#88aaff;border:1px solid #334;cursor:pointer;transition:all .15s;text-align:center}
  .kb-btn:hover{border-color:#4466ff;color:#fff}
  .kb-btn.listening{border-color:#ffaa00;color:#ffcc00;animation:pulse .5s infinite alternate}
  @keyframes pulse{from{box-shadow:0 0 4px #ffaa00}to{box-shadow:0 0 12px #ffaa00}}
  /* ═══ MOBILE TOUCH CONTROLS ═══ */
  #touch{display:none;position:absolute;bottom:0;left:0;width:100%;z-index:5;pointer-events:none}
  #touch.show{display:block}
  .t-btn{position:absolute;pointer-events:all;border-radius:50%;border:2px solid rgba(100,150,255,0.4);
    background:rgba(20,20,60,0.5);color:rgba(150,180,255,0.7);display:flex;align-items:center;justify-content:center;
    font-family:'Press Start 2P',monospace;font-size:10px;user-select:none;-webkit-user-select:none;touch-action:none}
  .t-btn:active,.t-btn.pressed{background:rgba(60,80,180,0.6);border-color:rgba(100,150,255,0.8)}
  .t-dpad{width:52px;height:52px}
  .t-act{width:58px;height:58px}
  .t-sm{width:44px;height:44px;font-size:7px}
</style>
</head>
<body>
<div id="W">
  <canvas id="C"></canvas>
  <div id="O" class="active"></div>
  <!-- Mobile touch controls — hidden on desktop -->
  <div id="touch">
    <!-- D-pad left side -->
    <div class="t-btn t-dpad" id="tL" style="left:12px;bottom:60px">◀</div>
    <div class="t-btn t-dpad" id="tR" style="left:78px;bottom:60px">▶</div>
    <div class="t-btn t-dpad" id="tU" style="left:45px;bottom:120px">▲</div>
    <div class="t-btn t-dpad" id="tD" style="left:45px;bottom:8px">▼</div>
    <!-- Action buttons right side -->
    <div class="t-btn t-act" id="tShoot" style="right:14px;bottom:55px">🔫</div>
    <div class="t-btn t-act" id="tJump" style="right:80px;bottom:100px">⬆</div>
    <div class="t-btn t-sm" id="tDash" style="right:85px;bottom:45px;font-size:6px">DSH</div>
    <div class="t-btn t-sm" id="tShield" style="right:14px;bottom:125px;font-size:6px">SHD</div>
    <div class="t-btn t-sm" id="tSuper" style="right:145px;bottom:75px;font-size:6px">SUP</div>
    <!-- Pause -->
    <div class="t-btn" id="tPause" style="right:8px;top:8px;width:36px;height:36px;font-size:8px;border-radius:6px">⏸</div>
  </div>
</div>
<script>
const canvas=document.getElementById('C'),ctx=canvas.getContext('2d'),OV=document.getElementById('O');
const GW=720,GH=420,GRAVITY=1000,GROUND=GH-52;

// ═══════════ RESOLUTION & SCALING ═══════════
// Internal resolution stays 720x420, but canvas pixel buffer scales to screen DPI
// Visual size fills the entire viewport with correct aspect ratio
function resizeCanvas(){
  const dpr=window.devicePixelRatio||1;
  const vw=window.innerWidth, vh=window.innerHeight;
  // Fit: scale to fill viewport while keeping aspect ratio (cover mode)
  const scaleX=vw/GW, scaleY=vh/GH;
  const scale=Math.min(scaleX,scaleY); // fit inside (no crop)
  const displayW=Math.round(GW*scale);
  const displayH=Math.round(GH*scale);
  // CSS size = display size
  canvas.style.width=displayW+'px';
  canvas.style.height=displayH+'px';
  // Pixel buffer = display * DPR for sharp rendering on HiDPI
  const bufW=Math.round(displayW*dpr);
  const bufH=Math.round(displayH*dpr);
  if(canvas.width!==bufW||canvas.height!==bufH){
    canvas.width=bufW;
    canvas.height=bufH;
  }
  // Scale context so game logic still uses 720x420 coordinates
  ctx.setTransform(bufW/GW,0,0,bufH/GH,0,0);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
// Also resize on orientation change (mobile)
window.addEventListener('orientationchange',function(){setTimeout(resizeCanvas,100)});
// Resize on fullscreen toggle
document.addEventListener('fullscreenchange',function(){setTimeout(resizeCanvas,100)});

// ═══════════ AUDIO ═══════════
const AC=window.AudioContext||window.webkitAudioContext;let ac=null;
function initA(){if(!ac)ac=new AC()}
function sfx(t){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);const T=ac.currentTime;
const P={shoot:['square',600,200,.08,.1],charged:['sawtooth',300,900,.15,.16],hit:['sawtooth',150,50,.12,.12],
pHit:['square',200,60,.25,.16],dash:['triangle',400,1200,.1,.07],shield:['sine',800,1600,.12,.1],
death:['sawtooth',400,30,.8,.18],phase:['sawtooth',100,600,.4,.13],victory:['square',523,1047,.6,.1],
sel:['sine',500,800,.1,.08],super:['square',200,1200,.3,.18]}[t]||['square',440,220,.1,.1];
o.type=P[0];o.frequency.setValueAtTime(P[1],T);o.frequency.exponentialRampToValueAtTime(P[2],T+P[3]);
g.gain.setValueAtTime(P[4],T);g.gain.exponentialRampToValueAtTime(.001,T+P[3]);o.start(T);o.stop(T+P[3]+.01)}
let bgm=[];
function startBGM(f){if(!ac)return;stopBGM();const gn=ac.createGain();gn.gain.value=.025;gn.connect(ac.destination);
[1,1.5,2].forEach(m=>{const o=ac.createOscillator();o.type=m===1?'triangle':'sine';o.frequency.value=f*m;o.connect(gn);o.start();bgm.push(o)});bgm.push(gn)}
function stopBGM(){bgm.forEach(n=>{try{n.stop()}catch(e){}});bgm=[]}

// ═══════════ INPUT — REBINDABLE ═══════════
const K={},JP={};
// Keybinding config: action → array of key codes
const defaultBinds={
  left:['ArrowLeft','KeyA'], right:['ArrowRight','KeyD'],
  up:['ArrowUp','KeyW'], down:['ArrowDown','KeyS'],
  jump:['KeyW','ArrowUp'], // separate jump action
  shoot:['Space'], dash:['KeyF'],
  shield:['KeyL','KeyC'], super:['KeyE','KeyV']
};
let binds=JSON.parse(JSON.stringify(defaultBinds));
// Load saved bindings — merge with defaults so new actions don't crash
try{const s=window.localStorage&&localStorage.getItem('dili_binds');
  if(s){const saved=JSON.parse(s);for(const k in defaultBinds){if(saved[k])binds[k]=saved[k]}}}catch(e){}
function saveBinds(){try{localStorage.setItem('dili_binds',JSON.stringify(binds))}catch(e){}}

// Pretty name for display
function keyName(code){
  const map={Space:'SPACE',ArrowUp:'↑',ArrowDown:'↓',ArrowLeft:'←',ArrowRight:'→',
    ShiftLeft:'L-SHIFT',ShiftRight:'R-SHIFT',ControlLeft:'L-CTRL',ControlRight:'R-CTRL',
    AltLeft:'L-ALT',AltRight:'R-ALT',Tab:'TAB',Enter:'ENTER',Backspace:'BACK',
    CapsLock:'CAPS',Escape:'ESC'};
  if(map[code])return map[code];
  if(code.startsWith('Key'))return code.slice(3);
  if(code.startsWith('Digit'))return code.slice(5);
  if(code.startsWith('Numpad'))return 'NUM'+code.slice(6);
  return code;
}

document.addEventListener('keydown',e=>{if(!K[e.code])JP[e.code]=true;K[e.code]=true;
  if(GS==='play'||GS==='menu'||GS==='pause'||rebindAction)e.preventDefault();
  // Rebinding mode
  if(rebindAction){
    if(e.code==='Escape'){rebindAction=null;showScr('keys');return}
    binds[rebindAction]=[e.code];saveBinds();rebindAction=null;showScr('keys');return}
  // Pause toggle
  if(e.code==='Escape'&&!rebindAction){
    if(GS==='play'){GS='pause';OV.classList.add('active');
      OV.innerHTML=`<h1>⏸ PAUSED</h1><h2>${BD[BI].name}</h2>
        <button class="btn" onclick="unpause()">RESUME</button>
        <button class="btn btn-sm" style="background:#333;border-color:#555" onclick="quitToMenu()">QUIT TO MENU</button>
        <div class="ch">ESC — Resume</div>`;return}
    if(GS==='pause'){unpause();return}}
});
document.addEventListener('keyup',e=>{K[e.code]=false});

function kd(a){return binds[a]&&binds[a].some(k=>K[k])}
function kp(a){return binds[a]&&binds[a].some(k=>JP[k])}
function clrJP(){for(let k in JP)delete JP[k]}

// Rebinding state
let rebindAction=null;

// ═══════════ UTILS ═══════════
function olap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function lerp(a,b,t){return a+(b-a)*t}
function rng(a,b){return a+Math.random()*(b-a)}
function pick(a){return a[Math.random()*a.length|0]}

// ═══════════ PARTICLES ═══════════
const parts=[];
function spark(x,y,c,n=5,s=80,l=.4){for(let i=0;i<n;i++){const a=Math.random()*6.28;
parts.push({x,y,vx:Math.cos(a)*(Math.random()*s+20),vy:Math.sin(a)*(Math.random()*s+20),life:l+Math.random()*.2,ml:l+.2,c,sz:2+Math.random()*3})}}
function updParts(dt){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1)}}
function drwParts(){for(const p of parts){ctx.globalAlpha=Math.max(0,p.life/p.ml);ctx.fillStyle=p.c;ctx.fillRect(p.x-p.sz/2|0,p.y-p.sz/2|0,p.sz,p.sz)}ctx.globalAlpha=1}
let shT=0,shI=0;function shake(i,d){shI=i;shT=d}

// ═══════════ TELEGRAPH SYSTEM ═══════════
const telegraphs=[];
function addTelegraph(x,y,w,h,dur){telegraphs.push({x,y,w,h,life:dur,ml:dur})}
function updTelegraphs(dt){for(let i=telegraphs.length-1;i>=0;i--){telegraphs[i].life-=dt;if(telegraphs[i].life<=0)telegraphs.splice(i,1)}}
function drwTelegraphs(){for(const t of telegraphs){const a=.15+.15*Math.sin(t.life*20);ctx.globalAlpha=a;ctx.fillStyle='#ff3366';ctx.fillRect(t.x|0,t.y|0,t.w,t.h);ctx.globalAlpha=1}}

// ═══════════ PROJECTILES ═══════════
let pB=[],bB=[];
function drwBul(b){if(b.charged){ctx.fillStyle='#00eeff';ctx.fillRect(b.x-2|0,b.y-2|0,b.w+4,b.h+4);ctx.fillStyle='#aaeeff';ctx.fillRect(b.x|0,b.y|0,b.w,b.h)}
else if(b.ex){ctx.fillStyle='#ffaa00';ctx.fillRect(b.x-3|0,b.y-3|0,b.w+6,b.h+6);ctx.fillStyle='#ffee88';ctx.fillRect(b.x|0,b.y|0,b.w,b.h)}
else if(b.parryable){const s=b.w*(1+.3*Math.sin(Date.now()*.015));ctx.fillStyle='#ffaa00';ctx.fillRect(b.x-s/2+b.w/2|0,b.y-s/2+b.h/2|0,s,s);ctx.fillStyle='#ffdd44';ctx.fillRect(b.x+2|0,b.y+2|0,b.w-4,b.h-4)}
else{ctx.fillStyle=b.c||'#ff3366';ctx.fillRect(b.x|0,b.y|0,b.w,b.h)}}

// ═══════════ DRAW DILI — accurate speech bubble shape ═══════════
function drwDili(x,y,w,h,face,state,af,charge,parry,dashing,superMeter,crouching){
  ctx.save();ctx.translate(x+w/2|0,y+h/2|0);if(face<0)ctx.scale(-1,1);
  const bob=state==='run'?Math.sin(af*8)*2.5:state==='idle'?Math.sin(Date.now()*.003)*1.2:0;
  const sq=dashing>0?.8:1;
  // Crouch: squish vertically, widen slightly, shift down
  const crouchSq=crouching?.65:1;
  const crouchW=crouching?1.15:1;
  const crouchY=crouching?8:0;
  ctx.translate(0,crouchY);ctx.scale(crouchW,sq*crouchSq);

  // ── SPEECH BUBBLE BODY (Dili's true form!) ──
  const bw=30,bh=20,bx=-bw/2,by=-bh/2+bob-2;
  // Shadow/outline
  ctx.fillStyle='#1133aa';
  ctx.beginPath();ctx.roundRect(bx-2,by-2,bw+4,bh+4,10);ctx.fill();
  // Main blue body
  ctx.fillStyle='#4466ee';
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
  // Lighter top highlight
  ctx.fillStyle='#5588ff';
  ctx.beginPath();ctx.roundRect(bx+2,by+1,bw-4,bh/2,6);ctx.fill();

  // ── MUSHROOM growing from top of head ──
  const mBase=by; // sits right on top edge of the bubble
  ctx.fillStyle='#d4c4a8';ctx.fillRect(-2,mBase-7,4,7); // stem connects to head
  ctx.fillStyle='#dd2222';ctx.beginPath();ctx.ellipse(0,mBase-7,11,8,0,Math.PI,0);ctx.fill(); // cap
  ctx.fillStyle='#fff';[[-6,-12,2.5],[1,-14,2.5],[5,-11,2],[-3,-15,2],[4,-13,2]].forEach(d=>
    ctx.fillRect(d[0],mBase+d[1],d[2],d[2])); // white dots
  ctx.fillStyle='#eeddbb';ctx.fillRect(-11,mBase-7,22,2); // rim

  // Speech bubble tail (bottom-right)
  ctx.fillStyle='#4466ee';
  ctx.beginPath();ctx.moveTo(6,by+bh-2);ctx.lineTo(14,by+bh+8);ctx.lineTo(2,by+bh+1);ctx.fill();
  ctx.fillStyle='#1133aa';
  ctx.beginPath();ctx.moveTo(7,by+bh);ctx.lineTo(16,by+bh+10);ctx.lineTo(1,by+bh+2);ctx.fill();
  ctx.fillStyle='#4466ee';
  ctx.beginPath();ctx.moveTo(6,by+bh-2);ctx.lineTo(13,by+bh+7);ctx.lineTo(2,by+bh);ctx.fill();

  // ── DIAMOND EYES (rotated squares — white with black pupils) ──
  const eyeY=by+bh/2-2;
  // Left eye
  ctx.save();ctx.translate(-8,eyeY);ctx.rotate(Math.PI/4);
  ctx.fillStyle='#ffffff';ctx.fillRect(-5,-5,10,10);
  ctx.fillStyle='#111111';ctx.fillRect(-3,-3,6,6);ctx.restore();
  // Right eye
  ctx.save();ctx.translate(8,eyeY);ctx.rotate(Math.PI/4);
  ctx.fillStyle='#ffffff';ctx.fillRect(-5,-5,10,10);
  ctx.fillStyle='#111111';ctx.fillRect(-3,-3,6,6);ctx.restore();

  // ── SMILE ──
  ctx.strokeStyle='#111133';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,eyeY+8,4,0.1*Math.PI,0.9*Math.PI);ctx.stroke();

  // ── LEGS (little stubby ones for running) ──
  const la=state==='run'?Math.sin(af*10)*4:0;
  ctx.fillStyle='#3355cc';
  ctx.fillRect(-8,by+bh+5+bob,5,8+la);ctx.fillRect(3,by+bh+5+bob,5,8-la);
  ctx.fillStyle='#2244aa';
  ctx.fillRect(-9,by+bh+12+bob+la,7,3);ctx.fillRect(2,by+bh+12+bob-la,7,3);

  // ── SWORD (right side) ──
  const sb=state==='idle'?Math.sin(Date.now()*.004)*2:0;
  ctx.fillStyle='#88ccff';ctx.fillRect(bw/2+4,eyeY-6+sb,3,16);
  ctx.fillStyle='#aaeeff';ctx.fillRect(bw/2+5,eyeY-10+sb,2,5);
  ctx.fillStyle='#4466aa';ctx.fillRect(bw/2+2,eyeY-6+sb,7,2);

  // ── SHIELD ORB ──
  ctx.strokeStyle='#00eeff';ctx.lineWidth=1.5;ctx.globalAlpha=.4+.2*Math.sin(Date.now()*.005);
  ctx.beginPath();ctx.arc(-bw/2-6,eyeY+2,6,0,6.28);ctx.stroke();ctx.globalAlpha=1;

  // Charge glow
  if(charge>.3){const i=Math.min(1,(charge-.3)/.5);
    ctx.globalAlpha=i*.35*(.5+.5*Math.sin(Date.now()*.01));ctx.fillStyle='#00eeff';ctx.fillRect(-20,-20+bob,40,40);ctx.globalAlpha=1}
  // Parry shield
  if(parry>0){ctx.globalAlpha=.5;ctx.strokeStyle='#00ffaa';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,bob,32,0,6.28);ctx.stroke();ctx.globalAlpha=1}
  // Super meter glow when full
  if(superMeter>=5){ctx.globalAlpha=.15+.1*Math.sin(Date.now()*.008);ctx.fillStyle='#ffcc00';ctx.fillRect(-22,-22+bob,44,44);ctx.globalAlpha=1}

  ctx.restore();
}

// ═══════════ PLAYER ═══════════
const P={x:80,y:GROUND-48,w:28,h:48,vx:0,vy:0,spd:240,jf:-460,hp:3,mhp:3,face:1,gnd:false,
  st:'idle',af:0,at:0,scd:0,sr:.15,ch:0,cht:.8,
  dT:0,dCd:0,dDur:.25,dSpd:620,dCdT:.4,dDir:1,
  iF:0,iFD:1.2,pCd:0,pA:0,pD:.3,
  super:0,maxSuper:5,
  // Shield energy: max 3 charges, recharges over time
  shieldE:3,shieldMax:3,shieldRecharge:0,shieldRechargeRate:1.8, // 1.8s per charge
  // Jump buffer: remember jump press for a few frames
  jumpBuf:0};

function resetP(){Object.assign(P,{x:80,y:GROUND-P.h,vx:0,vy:0,hp:P.mhp,face:1,st:'idle',
  dT:0,dCd:0,dDir:1,iF:0,scd:0,ch:0,pCd:0,pA:0,af:0,at:0,gnd:false,super:0,
  shieldE:P.shieldMax,shieldRecharge:0,jumpBuf:0,dashBuf:0,parryBuf:0,exBuf:0,coyote:0,
  crouching:false,_upPrev:false,_dashPrev:false,_parPrev:false,_exPrev:false})}

function updP(dt){
  if(P.iF>0)P.iF-=dt;P.scd-=dt;P.dCd-=dt;P.pCd-=dt;if(P.pA>0)P.pA-=dt;
  if(P.shieldE<P.shieldMax){P.shieldRecharge+=dt;
    if(P.shieldRecharge>=P.shieldRechargeRate){P.shieldRecharge=0;P.shieldE=Math.min(P.shieldMax,P.shieldE+1)}}

  // ── JUMP: edge-detect via held state (separate from aim-up!) ──
  const jumpNow=kd('jump');
  if(jumpNow&&!P._upPrev)P.jumpBuf=0.18;
  P._upPrev=jumpNow;
  if(P.jumpBuf>0)P.jumpBuf-=dt;
  if(P.gnd)P.coyote=0.12; else if(P.coyote>0)P.coyote-=dt;

  // ── Action buffers (edge-detect same way) ──
  const dashNow=kd('dash'); if(dashNow&&!P._dashPrev)P.dashBuf=0.15; P._dashPrev=dashNow;
  const parNow=kd('shield'); if(parNow&&!P._parPrev)P.parryBuf=0.15; P._parPrev=parNow;
  const exNow=kd('super');     if(exNow&&!P._exPrev)P.exBuf=0.15;     P._exPrev=exNow;
  if(P.dashBuf>0)P.dashBuf-=dt;
  if(P.parryBuf>0)P.parryBuf-=dt;
  if(P.exBuf>0)P.exBuf-=dt;

  // ── CROUCH (hold down on ground) ──
  P.crouching=kd('down')&&P.gnd&&P.dT<=0;

  // ── DASH (runs and returns early) ──
  if(P.dT>0){P.dT-=dt;P.x+=P.dSpd*P.dDir*dt;spark(P.x+P.w/2,P.y+P.h/2,'#4488ff',2,30,.2);
    P.x=Math.max(4,Math.min(GW-P.w-4,P.x));if(P.dT<=0)P.iF=.15;return}

  // ── MOVEMENT (no move while crouching) ──
  let mx=0;
  if(!P.crouching){if(kd('left')){mx=-1;P.face=-1}if(kd('right')){mx=1;P.face=1}}
  P.vx=mx*P.spd;

  // ── JUMP ──
  if(P.jumpBuf>0&&(P.gnd||P.coyote>0)&&!P.crouching){
    P.vy=P.jf;P.gnd=false;P.jumpBuf=0;P.coyote=0}

  P.vy+=GRAVITY*dt;P.x+=P.vx*dt;P.y+=P.vy*dt;
  if(P.y>=GROUND-P.h){P.y=GROUND-P.h;P.vy=0;P.gnd=true}
  P.x=Math.max(4,Math.min(GW-P.w-4,P.x));

  // ── DASH trigger ──
  if(P.dashBuf>0&&P.dCd<=0){P.dashBuf=0;let dd=P.face;if(kd('left'))dd=-1;if(kd('right'))dd=1;
    P.dDir=dd;P.dT=P.dDur;P.dCd=P.dCdT;P.iF=P.dDur+.15;sfx('dash');spark(P.x+P.w/2,P.y+P.h/2,'#66aaff',12,80,.35)}
  // ── SHIELD trigger ──
  if(P.parryBuf>0&&P.pCd<=0&&P.shieldE>=1){P.parryBuf=0;P.pA=P.pD;P.pCd=.35;P.shieldE--;P.shieldRecharge=0;sfx('shield')}
  // ── EX trigger ──
  if(P.exBuf>0&&P.super>=1){P.exBuf=0;P.super--;sfx('super');shake(4,.2);score.superUsed++;
    let ax=P.face,ay=0;if(kd('up'))ay=-1;if(kd('down')&&!P.gnd)ay=1;
    if(kd('left'))ax=-1;if(kd('right'))ax=1;
    if(kd('up')&&!kd('left')&&!kd('right'))ax=0;
    const al=Math.hypot(ax,ay)||1;ax/=al;ay/=al;
    for(let i=-1;i<=1;i++){const sa=Math.atan2(ay,ax)+i*.15;
      pB.push({x:P.x+P.w/2+ax*10-10,y:P.y+P.h/2+ay*10-10,
        vx:Math.cos(sa)*400,vy:Math.sin(sa)*400,w:14,h:10,damage:3,ex:true})}
    spark(P.x+P.w/2,P.y+P.h/2,'#ffcc00',18,140,.5)}

  // ── SHOOT (hold to autofire, directional) ──
  if(kd('shoot')){if(P.scd<=0){
    let ax=P.face,ay=0;
    if(kd('up'))ay=-1;
    if(kd('down')){if(!P.gnd)ay=1; else ay=0;}
    if(kd('left'))ax=-1;if(kd('right'))ax=1;
    if(kd('up')&&!kd('left')&&!kd('right'))ax=0;
    if(kd('down')&&!kd('left')&&!kd('right')&&!P.gnd)ax=0;

  // ── STATE ──
  P.st=P.dT>0?'dash':!P.gnd?'jump':P.crouching?'crouch':mx?'run':'idle';
  P.at+=dt;if(P.at>.12){P.at=0;P.af++}
}

// ═══════════ SCORING (osu!-style grading) ═══════════
const score={time:0,hits:0,shields:0,superUsed:0,deaths:0,dmgDealt:0};
function resetScore(){Object.assign(score,{time:0,hits:0,shields:0,superUsed:0,deaths:0,dmgDealt:0})}
function calcGrade(){
  // S = 0 hits taken, fast time
  // A = 0-1 hits, decent time
  // B = 2 hits or slow
  // C = 3+ hits or died once and retried
  // D = died
  const t=score.time, h=score.hits, p=score.shields;
  let pts=10000;
  pts-=h*1500; // lose points per hit taken
  pts+=p*500; // gain for parries
  pts+=score.superUsed*200; // bonus for EX use
  pts-=Math.max(0,t-30)*20; // penalty for slow (>30s)
  pts=Math.max(0,pts);

  let grade='D';
  if(h===0&&t<45) grade='S';
  else if(h===0) grade='A';
  else if(h<=1&&t<60) grade='A';
  else if(h<=1) grade='B';
  else if(h<=2) grade='B';
  else if(h<=3) grade='C';
  else grade='D';

  // Colors for grades
  const colors={S:'#ffee00',A:'#44ff44',B:'#44aaff',C:'#ff8844',D:'#ff4444'};
  return {grade,pts,color:colors[grade]};
}

function pHit(){if(P.iF>0||P.dT>0)return false;P.hp--;P.iF=P.iFD;sfx('pHit');shake(6,.3);
  spark(P.x+P.w/2,P.y+P.h/2,'#ff4444',12,120,.4);
  score.hits++;
  if(P.hp<=0){sfx('death');score.deaths++;GS='over';stopBGM();setTimeout(()=>showScr('over'),500)}return true}

// ═══════════ PROJECTILE UPDATE ═══════════
function updProj(dt){
  for(let i=pB.length-1;i>=0;i--){const b=pB[i];b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.x<-20||b.x>GW+20||b.y<-20||b.y>GH+20){pB.splice(i,1);continue}
    if(AB&&olap(b,AB)){bDmg(b.damage);pB.splice(i,1)}}
  for(let i=bB.length-1;i>=0;i--){const b=bB[i];
    if(b.age!==undefined)b.age+=dt;if(b.lifetime!==undefined){b.lifetime-=dt;if(b.lifetime<=0){bB.splice(i,1);continue}}
    if(b.homing){const dx=P.x-b.x,dy=P.y-b.y,d=Math.hypot(dx,dy)||1;
      b.vx+=(dx/d)*50*dt;b.vy+=(dy/d)*50*dt;const s=Math.hypot(b.vx,b.vy);if(s>115){b.vx=b.vx/s*115;b.vy=b.vy/s*115}}
    if(b.grav)b.vy+=400*dt;
    b.x+=b.vx*dt;if(b.sw&&b.bY!==undefined)b.y=b.bY+Math.sin(b.age*b.ss+b.so)*b.sa;else b.y+=b.vy*dt;
    if(b.x<-40||b.x>GW+40||b.y<-40||b.y>GH+40){bB.splice(i,1);continue}
    // Shield blocks ALL bullets when active
    if(P.pA>0&&olap({x:P.x-14,y:P.y-14,w:P.w+28,h:P.h+28},b)){
      bB.splice(i,1);score.shields++;
      spark(b.x,b.y,b.parryable?'#ffcc00':'#00ffaa',8,90,.3);
      sfx('shield');
      // Parryable (golden) bullets give super meter + boss damage
      if(b.parryable){P.super=Math.min(P.maxSuper,P.super+1);bDmg(3)}
      else{P.super=Math.min(P.maxSuper,P.super+.3)} // regular blocks give small super
      continue}
    if(olap(b,P)){if(pHit())bB.splice(i,1)}}
}
function drwProj(){for(const b of pB)drwBul(b);for(const b of bB)drwBul(b)}

function drwBG(dt){
  bgTime+=dt;
  const g=ctx.createLinearGradient(0,0,0,GH);g.addColorStop(0,'#06060e');g.addColorStop(.6,'#0e0e24');g.addColorStop(1,'#1a1a3a');

  // Shimmer effect — color shifts over time
  const hue1=`hsl(${230+Math.sin(bgTime*.5)*20},80%,55%)`;
  const hue2=`hsl(${260+Math.cos(bgTime*.7)*20},80%,65%)`;
  ctx.globalAlpha=0.06+0.02*Math.sin(bgTime*1.5);
  ctx.font='bold 64px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
  // Shadow layer
  ctx.fillStyle='#1122aa';ctx.fillText('DLICOM',logoX+3,logoY+3);
  // Main text
  ctx.fillStyle=hue1;ctx.fillText('DLICOM',logoX,logoY);
  // Highlight pass
  ctx.globalAlpha=0.04+0.015*Math.sin(bgTime*2);
  ctx.fillStyle=hue2;ctx.fillText('DLICOM',logoX-1,logoY-1);
  // Small Dili icon left of text (diamond eye)
  ctx.globalAlpha=0.07+0.02*Math.sin(bgTime*1.2);

  // Swoosh line under logo

  ctx.beginPath();ctx.moveTo(logoX-180,logoY+36);ctx.lineTo(logoX+180,logoY+36);ctx.stroke();
  ctx.globalAlpha=1;ctx.restore();
  // Stars
  for(const s of stars){s.tw+=s.sp*dt*3;ctx.globalAlpha=.3+.5*Math.abs(Math.sin(s.tw));ctx.fillStyle='#aabbdd';ctx.fillRect(s.x|0,s.y|0,s.sz,s.sz)}

// ═══════════ MAIN LOOP (Hz-independent) ═══════════
let lt=0,accum=0;
const TICK=1/120;
// Helper: apply base transform (DPR scaling)
function applyBaseTransform(){
  const dpr=window.devicePixelRatio||1;
  const bw=canvas.width,bh=canvas.height;
  ctx.setTransform(bw/GW,0,0,bh/GH,0,0);
}
function loop(ts){requestAnimationFrame(loop);
  if(lt===0){lt=ts;return}
  const raw=(ts-lt)/1e3;lt=ts;
  const dt=Math.min(raw,.1);
  if(GS==='pause'){
    applyBaseTransform();
    drwBG(0);drwTelegraphs();drwBoss();drwP();drwProj();drwParts();drwHUD();drwIntro();
    clrJP();return}
  accum+=dt;
  let steps=0;
  while(accum>=TICK&&steps<4){
    if(GS==='play'){
      score.time+=TICK;
      if(!introActive){updP(TICK);updBoss(TICK);updProj(TICK)}
      updParts(TICK);updTelegraphs(TICK);updIntro(TICK)}
    else updParts(TICK);
    accum-=TICK;steps++;
  }
  // Render
  let sx=0,sy=0;if(shT>0){shT-=dt;sx=(Math.random()-.5)*shI*2;sy=(Math.random()-.5)*shI*2}
  applyBaseTransform();
  ctx.translate(sx,sy);
  drwBG(dt);
  if(GS==='play'||GS==='over'||GS==='win'){drwTelegraphs();drwBoss();drwP();drwProj();drwParts();drwHUD();drwIntro()}
  if(GS==='win'&&AB&&Math.random()<.3)spark(AB.x+rng(0,AB.w),AB.y+rng(0,AB.h),Math.random()>.5?'#ffaa00':'#ff22ff',2,80,.4);
  clrJP()}
requestAnimationFrame(loop);

// ═══════════ MOBILE TOUCH CONTROLS ═══════════
(function(){
  // Detect touch device
  var isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
  var touchEl=document.getElementById('touch');
  if(!isMobile||!touchEl)return;
  touchEl.classList.add('show');

  // Map touch buttons to fake keyboard keys
  var touchMap={
    tL:'ArrowLeft', tR:'ArrowRight', tU:'ArrowUp', tD:'ArrowDown',
    tJump:'KeyW', tShoot:'Space', tDash:'KeyF',
    tShield:'KeyL', tSuper:'KeyE'
  };

  // Track active touches per button
  var activeButtons={};

  function pressKey(code){if(!K[code])JP[code]=true;K[code]=true}
  function releaseKey(code){K[code]=false}

  function handleTouch(e){
    e.preventDefault();
    // Collect all currently touched button IDs
    var nowTouched={};
    for(var i=0;i<e.touches.length;i++){
      var t=e.touches[i];
      var el=document.elementFromPoint(t.clientX,t.clientY);
      if(el&&el.id&&touchMap[el.id]){
        nowTouched[el.id]=true;
        el.classList.add('pressed');
      }
    }
    // Press newly touched
    for(var id in nowTouched){
      if(!activeButtons[id]){pressKey(touchMap[id])}
    }
    // Release no longer touched
    for(var id in activeButtons){
      if(!nowTouched[id]){
        releaseKey(touchMap[id]);
        var el=document.getElementById(id);
        if(el)el.classList.remove('pressed');
      }
    }
    activeButtons=nowTouched;
  }

  function handleTouchEnd(e){
    e.preventDefault();
    // Rebuild active set from remaining touches
    var nowTouched={};
    for(var i=0;i<e.touches.length;i++){
      var t=e.touches[i];
      var el=document.elementFromPoint(t.clientX,t.clientY);
      if(el&&el.id&&touchMap[el.id])nowTouched[el.id]=true;
    }
    for(var id in activeButtons){
      if(!nowTouched[id]){
        releaseKey(touchMap[id]);
        var el=document.getElementById(id);
        if(el)el.classList.remove('pressed');
      }
    }
    activeButtons=nowTouched;
  }

  // Pause button special handling
  var pauseBtn=document.getElementById('tPause');
  if(pauseBtn){
    pauseBtn.addEventListener('touchstart',function(e){
      e.preventDefault();e.stopPropagation();
      if(GS==='play'){GS='pause';OV.classList.add('active');
        OV.innerHTML='<h1>⏸ PAUSED</h1><button class="btn" onclick="unpause()">RESUME</button>'+
          '<button class="btn btn-sm" style="background:#333;border-color:#555;margin-top:8px" onclick="quitToMenu()">QUIT</button>'}
      else if(GS==='pause'){unpause()}
    },{passive:false});
  }

  document.addEventListener('touchstart',handleTouch,{passive:false});
  document.addEventListener('touchmove',handleTouch,{passive:false});
  document.addEventListener('touchend',handleTouchEnd,{passive:false});
  document.addEventListener('touchcancel',handleTouchEnd,{passive:false});
})();
</script>
</body>
</html>
